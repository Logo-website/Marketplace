{% extends "admin/base_site.html" %}
{% block content %}
<p>Укажите причину отклонения выбранных товаров. Причину увидит продавец.</p>
<form action="" method="post">{% csrf_token %}
  {% for product in products %}
    <input type="hidden" name="_selected_action" value="{{ product.pk }}">
    <p>{{ product.name }} ({{ product.seller }})</p>
  {% endfor %}
  <p>
    <label for="reason">Причина:</label><br>
    <textarea id="reason" name="reason" rows="4" cols="60" maxlength="{{ reason_max }}" required></textarea>
  </p>
  <input type="hidden" name="action" value="{{ action }}">
  <input type="submit" name="apply" value="Отклонить">
</form>
{% endblock %}
